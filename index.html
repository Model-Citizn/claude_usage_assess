  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n<\u002Fstyle>\n  <style>/* Digital Team — Color tokens\n   A dark, premium identity: deep navy fields, a single warm coral accent that does all the\n   pointing, and a cool steel as its quieter partner. Text is a near-white \"cloud\" stepping down\n   to \"mist\". Base values first (named exactly as the product code names them), then semantic aliases.\n   color-scheme is dark — this system is dark-first. */\n\n:root {\n  color-scheme: dark;\n\n  /* ---------- Navy field (backgrounds → borders) ---------- */\n  --ink:        #0c1220;  /* deepest background — page floor, insets */\n  --navy:       #121a2e;  /* base background — the canvas */\n  --navy-700:   #19233b;  /* raised panels & cards */\n  --navy-600:   #223049;  /* panel hover / inner borders / step numerals */\n  --slate-line: #2c3a55;  /* hairline borders & dividers */\n\n  /* ---------- Coral — the one accent ---------- */\n  --coral:        #f0653f;  /* primary accent: CTAs, links, key words, icons */\n  --coral-bright: #ff7a52;  /* hover / lifted */\n  --coral-dim:    #c44e2e;  /* pressed / scrollbar thumb */\n\n  /* ---------- Steel — the quiet second ---------- */\n  --steel:     #6f93bd;  /* secondary accent: alternate workers, supporting icons */\n  --steel-dim: #2f4663;  /* steel borders / faint fills */\n\n  /* ---------- Text on dark ---------- */\n  --cloud:    #eef2f8;  /* primary text — headings & emphasis */\n  --mist:     #aab6cc;  /* body / muted text */\n  --mist-dim: #7e8aa3;  /* captions, meta, placeholder */\n  --white:    #ffffff;  /* text on coral */\n\n  /* ---------- Translucent accent washes ---------- */\n  --coral-10:  rgba(240,101,63,0.10); /* icon-chip fill */\n  --coral-15:  rgba(240,101,63,0.15); /* highlighted gradient stop */\n  --coral-25:  rgba(240,101,63,0.25); /* faint number watermark */\n  --coral-40:  rgba(240,101,63,0.40); /* card ring / border */\n  --steel-10:  rgba(111,147,189,0.10);\n  --steel-25:  rgba(111,147,189,0.25);\n  --steel-40:  rgba(111,147,189,0.40);\n\n  /* ================= SEMANTIC ALIASES ================= */\n  /* Surfaces */\n  --surface-page:    var(--navy);      /* app / page canvas */\n  --surface-floor:   var(--ink);       /* deepest band (pricing, footer) */\n  --surface-panel:   var(--navy-700);  /* cards & raised panels */\n  --surface-raised:  var(--navy-600);  /* hover / gradient top */\n  --border-hairline: var(--slate-line);/* default 1px border */\n\n  /* Accents */\n  --accent:        var(--coral);\n  --accent-hover:  var(--coral-bright);\n  --accent-press:  var(--coral-dim);\n  --accent-2:      var(--steel);\n\n  /* Text */\n  --text-strong: var(--cloud);   /* headings, emphasised body */\n  --text-body:   var(--mist);    /* paragraphs */\n  --text-muted:  var(--mist-dim);/* captions, meta, labels */\n  --text-on-accent: var(--white);\n\n  /* Worker accent tokens (coral = highlighted, steel = standard) */\n  --worker-coral: var(--coral);\n  --worker-steel: var(--steel);\n}\n<\u002Fstyle>\n  <style>/* Digital Team — Typography tokens\n   Two voices in dialogue:\n   · DISPLAY (Fraunces, serif) — every headline, worker name, price & big stat. Warm, optical, human.\n     Always set semibold (600) with tight tracking; the last word of a heading is coloured coral.\n   · UI (Geist, sans) — all body copy, labels, buttons, nav. Calm, neutral, legible.\n   Numbers in stat/price positions use Fraunces too — the brand treats figures as headlines. */\n\n:root {\n  /* ---------- Families ---------- */\n  --font-display: 'Fraunces', Georgia, 'Times New Roman', serif; /* headings, names, prices */\n  --font-sans:    'Geist', ui-sans-serif, system-ui, -apple-system, sans-serif; /* UI & body */\n  --font-mono:    ui-monospace, 'SF Mono', Menlo, monospace; /* rare: code / tokens */\n\n  /* ---------- Weights ---------- */\n  --w-regular:  400;\n  --w-medium:   500;  /* body emphasis, labels, descriptive lines */\n  --w-semibold: 600;  /* the brand's default heading weight */\n  --w-bold:     700;  /* prices, step numerals, logo glyph */\n\n  /* ---------- Display scale (Fraunces) ---------- */\n  --size-hero:      72px; /* hero h1 (scales 48→60→72) */\n  --size-display:   60px; /* section h2 top size */\n  --size-h2:        48px; /* section heading mid */\n  --size-h2-sm:     36px; /* section heading base */\n  --size-descriptive: 30px; /* supporting line under heading (24→30) */\n  --size-price:     48px; /* pricing figure */\n  --size-stat:      36px; /* ROI stat figure */\n  --size-card-title: 24px; /* worker / card name */\n  --size-h3:        20px; /* sub-card title */\n\n  /* ---------- Text scale (Geist) ---------- */\n  --size-lead:  18px;  /* hero sub & section sub (text-lg) */\n  --size-body:  16px;  /* base body */\n  --size-ui:    14px;  /* default UI / card body (text-sm) */\n  --size-label: 12px;  /* eyebrows, pills, uppercase labels (text-xs) */\n  --size-meta:  11px;  /* micro-labels (in-action tag) */\n\n  /* ---------- Tracking ---------- */\n  --track-tight:  -0.02em; /* display headings (tracking-tight) */\n  --track-snug:   -0.01em;\n  --track-wide:    0.05em; /* uppercase labels (tracking-wider) */\n\n  /* ---------- Line heights ---------- */\n  --lh-hero:    1.05;  /* display headings */\n  --lh-snug:    1.2;   /* descriptive lines */\n  --lh-body:    1.6;   /* relaxed body copy */\n  --lh-ui:      1.5;\n\n  /* ================= SEMANTIC TYPE ROLES ================= */\n  --type-hero:        var(--w-semibold) var(--size-hero)/var(--lh-hero) var(--font-display);\n  --type-h2:          var(--w-semibold) var(--size-h2)/var(--lh-hero) var(--font-display);\n  --type-descriptive: var(--w-medium) var(--size-descriptive)/var(--lh-snug) var(--font-sans);\n  --type-card-title:  var(--w-semibold) var(--size-card-title)/1.15 var(--font-display);\n  --type-price:       var(--w-bold) var(--size-price)/1 var(--font-display);\n  --type-lead:        var(--w-regular) var(--size-lead)/var(--lh-body) var(--font-sans);\n  --type-body:        var(--w-regular) var(--size-ui)/var(--lh-body) var(--font-sans);\n  --type-label:       var(--w-medium) var(--size-label)/1 var(--font-sans);\n}\n<\u002Fstyle>\n  <style>/* Digital Team — Spacing, radius, border, shadow, motion & effect tokens\n   The system is round and soft: pill buttons, 16–24px card radii, generous 96–112px section\n   rhythm. Depth comes from translucent panels over a navy field plus coral \"glow\" shadows —\n   not hard drop shadows. Two signature backdrops (aurora + grid) live here as ready CSS. */\n\n:root {\n  /* ---------- Spacing scale (4px base) ---------- */\n  --space-1:  4px;\n  --space-2:  8px;\n  --space-3:  12px;\n  --space-4:  16px;\n  --space-5:  20px;   /* mobile gutter (px-5) */\n  --space-6:  24px;\n  --space-7:  28px;   /* card padding */\n  --space-8:  32px;   /* desktop gutter (px-8) */\n  --space-9:  36px;\n  --space-10: 40px;\n  --space-14: 56px;   /* grid-texture cell / heading→grid gap */\n  --space-16: 64px;\n  --space-24: 96px;   /* section vertical padding (py-24) */\n  --space-28: 112px;  /* section vertical padding (py-28) */\n\n  /* ---------- Radii (the brand is round) ---------- */\n  --radius-sm:   8px;   /* logo glyph, small chips (rounded-lg) */\n  --radius-md:   12px;  /* icon tiles (rounded-xl) */\n  --radius-lg:   16px;  /* standard cards, stats (rounded-2xl) */\n  --radius-xl:   24px;  /* feature / price cards (rounded-3xl) */\n  --radius-pill: 999px; /* buttons, toggles, badges, sliders */\n\n  /* ---------- Borders ---------- */\n  --border-hairline: 1px solid var(--slate-line);   /* default card border */\n  --border-coral:    1px solid var(--coral-40);      /* highlighted card */\n  --border-steel:    1px solid var(--steel-40);      /* steel card */\n  --accent-rule:     2px;  /* left-accent on \"in action\" callouts */\n\n  /* ---------- Shadows & glows (sparing, coral-tinted) ---------- */\n  --shadow-none:    none;\n  --shadow-cta:     0 10px 30px -8px rgba(240,101,63,0.6);    /* coral button rest */\n  --shadow-cta-hi:  0 14px 40px -8px rgba(240,101,63,0.75);   /* coral button hover */\n  --shadow-glow:    0 0 0 1px rgba(240,101,63,0.4), 0 18px 50px -12px rgba(240,101,63,0.35);\n  --shadow-node:    0 0 60px -12px rgba(240,101,63,0.6);      /* hero \"you\" node halo */\n  --shadow-panel:   0 24px 60px -24px rgba(0,0,0,0.7);        /* lifted dark panel */\n  --shadow-price:   0 30px 80px -30px rgba(240,101,63,0.4);   /* highlighted price card */\n  --shadow-logo:    0 6px 16px -6px rgba(240,101,63,0.8);     /* coral logo glyph */\n\n  /* ---------- Layout ---------- */\n  --page-max:   1280px; /* max-w-7xl content width */\n  --reading-max: 672px; /* max-w-2xl heading measure */\n  --nav-h:      64px;\n\n  /* ---------- Motion ---------- */\n  --ease-out:   cubic-bezier(0.22, 1, 0.36, 1); /* signature reveal/flip ease */\n  --ease-std:   cubic-bezier(0.4, 0, 0.2, 1);\n  --dur-fast:   0.15s;  /* hovers */\n  --dur-base:   0.3s;   /* CTAs, nav, colour shifts */\n  --dur-reveal: 0.6s;   /* scroll-in reveals */\n  --dur-flip:   0.65s;  /* card flip */\n  --lift:       translateY(-1px); /* hover lift on buttons/cards (-translate-y-0.5) */\n\n  /* ---------- Signature backdrops (drop onto a positioned layer) ---------- */\n  --bg-aurora:\n    radial-gradient(60% 50% at 15% 0%, rgba(240,101,63,0.16), transparent 60%),\n    radial-gradient(50% 50% at 90% 10%, rgba(111,147,189,0.14), transparent 55%),\n    radial-gradient(70% 60% at 50% 100%, rgba(240,101,63,0.08), transparent 60%);\n  --grid-line: rgba(255,255,255,0.04);  /* grid-texture stroke */\n  --grid-cell: 56px;\n}\n<\u002Fstyle>\n  <style>/* EXL Cloud Design System — global entry point.\n   Consumers link THIS file only. It is an @import manifest; no rules live here directly.\n   Order: fonts → colors → typography → spacing. */\n\n/* Digital Team — Webfonts\n   Display: Fra  U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* cyrillic-ext */\n@font-face {\n  font-family: 'Geist';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"359330fe-f63a-4115-972a-d4c6af7560b0\") format('woff2');\n  unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* cyrillic */\n@font-face {\n  font-family: 'Geist';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"8e861cc3-409d-4881-b907-bc8965dbadbf\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Geist';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"f150e090-1c5f-4a2a-bdec-9ed089960a1f\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Geist';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"450931ab-b994-45ad-a5f9-12304a95663a\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Geist';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"c12bceb3-fae9-4055-9d49-e4cb0c57af33\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n/* Digital Team — Color tokens\n   A dark, premium identity: deep navy fields, a single warm coral accent that does all the\n   pointing, and a cool steel as its quieter partner. Text is a near-white \"cloud\" stepping down\n   to \"mist\". Base values first (named exactly as the product code names them), then semantic aliases.\n   color-scheme is dark — this system is dark-first. */\n\n:root {\n  color-scheme: dark;\n\n  /* ---------- Navy field (backgrounds → borders) ---------- */\n  --ink:        #0c1220;  /* deepest background — page floor, insets */\n  --navy:       #121a2e;  /* base background — the canvas */\n  --navy-700:   #19233b;  /* raised panels & cards */\n  --navy-600:   #223049;  /* panel hover / inner borders / step numerals */\n  --slate-line: #2c3a55;  /* hairline borders & dividers */\n\n  /* ---------- Coral — the one accent ---------- */\n  --coral:        #f0653f;  /* primary accent: CTAs, links, key words, icons */\n  --coral-bright: #ff7a52;  /* hover / lifted */\n  --coral-dim:    #c44e2e;  /* pressed / scrollbar thumb */\n\n  /* ---------- Steel — the quiet second ---------- */\n  --steel:     #6f93bd;  /* secondary accent: alternate workers, supporting icons */\n  --steel-dim: #2f4663;  /* steel borders / faint fills */\n\n  /* ---------- Text on dark ---------- */\n  --cloud:    #eef2f8;  /* primary text — headings & emphasis */\n  --mist:     #aab6cc;  /* body / muted text */\n  --mist-dim: #7e8aa3;  /* captions, meta, placeholder */\n  --white:    #ffffff;  /* text on coral */\n\n  /* ---------- Translucent accent washes ---------- */\n  --coral-10:  rgba(240,101,63,0.10); /* icon-chip fill */\n  --coral-15:  rgba(240,101,63,0.15); /* highlighted gradient stop */\n  --coral-25:  rgba(240,101,63,0.25); /* faint number watermark */\n  --coral-40:  rgba(240,101,63,0.40); /* card ring / border */\n  --steel-10:  rgba(111,147,189,0.10);\n  --steel-25:  rgba(111,147,189,0.25);\n  --steel-40:  rgba(111,147,189,0.40);\n\n  /* ================= SEMANTIC ALIASES ================= */\n  /* Surfaces */\n  --surface-page:    var(--navy);      /* app / page canvas */\n  --surface-floor:   var(--ink);       /* deepest band (pricing, footer) */\n  --surface-panel:   var(--navy-700);  /* cards & raised panels */\n  --surface-raised:  var(--navy-600);  /* hover / gradient top */\n  --border-hairline: var(--slate-line);/* default 1px border */\n\n  /* Accents */\n  --accent:        var(--coral);\n  --accent-hover:  var(--coral-bright);\n  --accent-press:  var(--coral-dim);\n  --accent-2:      var(--steel);\n\n  /* Text */\n  --text-strong: var(--cloud);   /* headings, emphasised body */\n  --text-body:   var(--mist);    /* paragraphs */\n  --text-muted:  var(--mist-dim);/* captions, meta, labels */\n  --text-on-accent: var(--white);\n\n  /* Worker accent tokens (coral = highlighted, steel = standard) */\n  --worker-coral: var(--coral);\n  --worker-steel: var(--steel);\n}\n\n/* Digital Team — Typography tokens\n   Two voices in dialogue:\n   · DISPLAY (Fraunces, serif) — every headline, worker name, price & big stat. Warm, optical, human.\n     Always set semibold (600) with tight tracking; the last word of a heading is coloured coral.\n   · UI (Geist, sans) — all body copy, labels, buttons, nav. Calm, neutral, legible.\n   Numbers in stat/price positions use Fraunces too — the brand treats figures as headlines. */\n\n:root {\n  /* ---------- Families ---------- */\n  --font-display: 'Fraunces', Georgia, 'Times New Roman', serif; /* headings, names, prices */\n  --font-sans:    'Geist', ui-sans-serif, system-ui, -apple-system, sans-serif; /* UI & body */\n  --font-mono:    ui-monospace, 'SF Mono', Menlo, monospace; /* rare: code / tokens */\n\n  /* ---------- Weights ---------- */\n  --w-regular:  400;\n  --w-medium:   500;  /* body emphasis, labels, descriptive lines */\n  --w-semibold: 600;  /* the brand's default heading weight */\n  --w-bold:     700;  /* prices, step numerals, logo glyph */\n\n  /* ---------- Display scale (Fraunces) ---------- */\n  --size-hero:      72px; /* hero h1 (scales 48→60→72) */\n  --size-display:   60px; /* section h2 top size */\n  --size-h2:        48px; /* section heading mid */\n  --size-h2-sm:     36px; /* section heading base */\n  --size-descriptive: 30px; /* supporting line under heading (24→30) */\n  --size-price:     48px; /* pricing figure */\n  --size-stat:      36px; /* ROI stat figure */\n  --size-card-title: 24px; /* worker / card name */\n  --size-h3:        20px; /* sub-card title */\n\n  /* ---------- Text scale (Geist) ---------- */\n  --size-lead:  18px;  /* hero sub & section sub (text-lg) */\n  --size-body:  16px;  /* base body */\n  --size-ui:    14px;  /* default UI / card body (text-sm) */\n  --size-label: 12px;  /* eyebrows, pills, uppercase labels (text-xs) */\n  --size-meta:  11px;  /* micro-labels (in-action tag) */\n\n  /* ---------- Tracking ---------- */\n  --track-tight:  -0.02em; /* display headings (tracking-tight) */\n  --track-snug:   -0.01em;\n  --track-wide:    0.05em; /* uppercase labels (tracking-wider) */\n\n  /* ---------- Line heights ---------- */\n  --lh-hero:    1.05;  /* display headings */\n  --lh-snug:    1.2;   /* descriptive lines */\n  --lh-body:    1.6;   /* relaxed body copy */\n  --lh-ui:      1.5;\n\n  /* ================= SEMANTIC TYPE ROLES ================= */\n  --type-hero:        var(--w-semibold) var(--size-hero)/var(--lh-hero) var(--font-display);\n  --type-h2:          var(--w-semibold) var(--size-h2)/var(--lh-hero) var(--font-display);\n  --type-descriptive: var(--w-medium) var(--size-descriptive)/var(--lh-snug) var(--font-sans);\n  --type-card-title:  var(--w-semibold) var(--size-card-title)/1.15 var(--font-display);\n  --type-price:       var(--w-bold) var(--size-price)/1 var(--font-display);\n  --type-lead:        var(--w-regular) var(--size-lead)/var(--lh-body) var(--font-sans);\n  --type-body:        var(--w-regular) var(--size-ui)/var(--lh-body) var(--font-sans);\n  --type-label:       var(--w-medium) var(--size-label)/1 var(--font-sans);\n}\n\n/* Digital Team — Spacing, radius, border, shadow, motion & effect tokens\n   The system is round and soft: pill buttons, 16–24px card radii, generous 96–112px section\n   rhythm. Depth comes from translucent panels over a navy field plus coral \"glow\" shadows —\n   not hard drop shadows. Two signature backdrops (aurora + grid) live here as ready CSS. */\n\n:root {\n  /* ---------- Spacing scale (4px base) ---------- */\n  --space-1:  4px;\n  --space-2:  8px;\n  --space-3:  12px;\n  --space-4:  16px;\n  --space-5:  20px;   /* mobile gutter (px-5) */\n  --space-6:  24px;\n  --space-7:  28px;   /* card padding */\n  --space-8:  32px;   /* desktop gutter (px-8) */\n  --space-9:  36px;\n  --space-10: 40px;\n  --space-14: 56px;   /* grid-texture cell / heading→grid gap */\n  --space-16: 64px;\n  --space-24: 96px;   /* section vertical padding (py-24) */\n  --space-28: 112px;  /* section vertical padding (py-28) */\n\n  /* ---------- Radii (the brand is round) ---------- */\n  --radius-sm:   8px;   /* logo glyph, small chips (rounded-lg) */\n  --radius-md:   12px;  /* icon tiles (rounded-xl) */\n  --radius-lg:   16px;  /* standard cards, stats (rounded-2xl) */\n  --radius-xl:   24px;  /* feature / price cards (rounded-3xl) */\n  --radius-pill: 999px; /* buttons, toggles, badges, sliders */\n\n  /* ---------- Borders ---------- */\n  --border-hairline: 1px solid var(--slate-line);   /* default card border */\n  --border-coral:    1px solid var(--coral-40);      /* highlighted card */\n  --border-steel:    1px solid var(--steel-40);      /* steel card */\n  --accent-rule:     2px;  /* left-accent on \"in action\" callouts */\n\n  /* ---------- Shadows & glows (sparing, coral-tinted) ---------- */\n  --shadow-none:    none;\n  --shadow-cta:     0 10px 30px -8px rgba(240,101,63,0.6);    /* coral button rest */\n  --shadow-cta-hi:  0 14px 40px -8px rgba(240,101,63,0.75);   /* coral button hover */\n  --shadow-glow:    0 0 0 1px rgba(240,101,63,0.4), 0 18px 50px -12px rgba(240,101,63,0.35);\n  --shadow-node:    0 0 60px -12px rgba(240,101,63,0.6);      /* hero \"you\" node halo */\n  --shadow-panel:   0 24px 60px -24px rgba(0,0,0,0.7);        /* lifted dark panel */\n  --shadow-price:   0 30px 80px -30px rgba(240,101,63,0.4);   /* highlighted price card */\n  --shadow-logo:    0 6px 16px -6px rgba(240,101,63,0.8);     /* coral logo glyph */\n\n  /* ---------- Layout ---------- */\n  --page-max:   1280px; /* max-w-7xl content width */\n  --reading-max: 672px; /* max-w-2xl heading measure */\n  --nav-h:      64px;\n\n  /* ---------- Motion ---------- */\n  --ease-out:   cubic-bezier(0.22, 1, 0.36, 1); /* signature reveal/flip ease */\n  --ease-std:   cubic-bezier(0.4, 0, 0.2, 1);\n  --dur-fast:   0.15s;  /* hovers */\n  --dur-base:   0.3s;   /* CTAs, nav, colour shifts */\n  --dur-reveal: 0.6s;   /* scroll-in reveals */\n  --dur-flip:   0.65s;  /* card flip */\n  --lift:       translateY(-1px); /* hover lift on buttons/cards (-translate-y-0.5) */\n\n  /* ---------- Signature backdrops (drop onto a positioned layer) ---------- */\n  --bg-aurora:\n    radial-gradient(60% 50% at 15% 0%, rgba(240,101,63,0.16), transparent 60%),\n    radial-gradient(50% 50% at 90% 10%, rgba(111,147,189,0.14), transparent 55%),\n    radial-gradient(70% 60% at 50% 100%, rgba(240,101,63,0.08), transparent 60%);\n  --grid-line: rgba(255,255,255,0.04);  /* grid-texture stroke */\n  --grid-cell: 56px;\n}\n\n<\u002Fstyle>\n  <script src=\"c0d5035e-2498-43be-b6e1-0cbdd5b5a10c\"><\u002Fscript>\n  <style>\n    @keyframes spin { to { transform: rotate(360deg); } }\n    @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }\n    body { margin: 0; }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height: 100vh; background: var(--ink); color: var(--cloud); font-family: var(--font-sans);\">\n\n  <!-- Aurora bg -->\n  <div style=\"position: fixed; inset: 0; background: var(--bg-aurora); pointer-events: none; z-index: 0;\"><\u002Fdiv>\n\n  <!-- Header -->\n  <header style=\"position: relative; z-index: 1; padding: 56px 20px 40px; text-align: center; border-bottom: 1px solid var(--slate-line);\">\n    <div style=\"max-width: var(--page-max); margin: 0 auto;\">\n      <div style=\"display: inline-flex; align-items: center; gap: 8px; padding: 6px 16px; border-radius: var(--radius-pill); border: 1px solid var(--slate-line); background: var(--navy-700); font: var(--type-label); color: var(--mist-dim); text-transform: uppercase; letter-spacing: var(--track-wide); margin-bottom: 20px;\">\n        <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--coral)\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 3l1.912 5.813a2 2 0 001.275 1.275L21 12l-5.813 1.912a2 2 0 00-1.275 1.275L12 21l-1.912-5.813a2 2 0 00-1.275-1.275L3 12l5.813-1.912a2 2 0 001.275-1.275z\"><\u002Fpath><\u002Fsvg>\n        Model Citizn\n      <\u002Fdiv>\n      <h1 style=\"font: var(--w-semibold) 44px/1.05 var(--font-display); letter-spacing: var(--track-tight); margin: 0;\">\n        Claude Usage Maturity <span style=\"color: var(--coral);\">Assessment<\u002Fspan>\n      <\u002Fh1>\n      <p style=\"font: var(--type-lead); color: var(--mist); margin-top: 12px; max-width: 520px; margin-left: auto; margin-right: auto;\">\n        Evaluate your AI readiness across 32 dimensions\n      <\u002Fp>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- Main -->\n  <main style=\"position: relative; z-index: 1; max-width: 720px; margin: 0 auto; padding: 24px 20px 64px;\">\n\n    <!-- Progress -->\n    <div style=\"position: sticky; top: 0; z-index: 20; background: linear-gradient(var(--ink), var(--ink) 80%, transparent); padding: 12px 0 16px;\">\n      <div style=\"height: 6px; background: var(--navy-700); border-radius: var(--radius-pill); overflow: hidden; border: 1px solid var(--slate-line);\">\n        <div style=\"height: 100%; border-radius: var(--radius-pill); background: linear-gradient(90deg, var(--coral), var(--steel)); transition: width 0.4s ease; width: {{ progressPct }}%;\"><\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"text-align: center; font-size: 12px; font-weight: 500; font-family: var(--font-sans); color: var(--mist-dim); margin-top: 8px;\">{{ progressLabel }}<\u002Fp>\n    <\u002Fdiv>\n\n    <!-- Rendered by logic class -->\n    {{ formContent }}\n\n  <\u002Fmain>\n\n  <!-- Footer -->\n  <footer style=\"position: relative; z-index: 1; text-align: center; padding: 32px 20px; border-top: 1px solid var(--slate-line); font-size: 12px; color: var(--mist-dim); font-family: var(--font-sans);\">\n    <p>© 2026 <a href=\"https://www.modelcitizn.com\" target=\"_blank\" style=\"color: var(--coral); text-decoration: none;\">Model Citizn<\u002Fa> · Claude Usage Maturity Assessment V2.00<\u002Fp>\n    <p style=\"margin-top: 4px;\">Powered by the Model Citizn Digital Worker Team<\u002Fp>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;100%&quot;},&quot;sheetsUrl&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;https://docs.google.com/spreadsheets/d/1Mi5NEXs2FDQxInBJN_M9bilbAGsetA4ehwyYWavvbdc/edit?gid=0#gid=0&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Backend&quot;,&quot;subtitle&quot;:&quot;Google Apps Script Web App URL for form submissions&quot;},&quot;brandName&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Model Citizn&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Branding&quot;}}\">\n\nclass Component extends DCLogic {\n  state = {\n    answers: {},\n    showResults: false,\n    submitting: false,\n    statusMsg: '',\n    statusType: '',\n    respName: '',\n    respEmail: '',\n    respOrg: '',\n    respRole: ''\n  };\n\n  questions = [\n    {cat:\"Account & Setup\",id:\"Q1\",q:\"Which Claude subscription plan are you on?\",type:\"multi\",max:4,opts:[\"Free\",\"Pro\",\"Max\",\"Team\",\"Enterprise\"]},\n    {cat:\"Account & Setup\",id:\"Q2\",q:\"How long have you been using Claude?\",type:\"multi\",max:3,opts:[\"< 1 month\",\"1-3 months\",\"3-6 months\",\"6-12 months\",\"12+ months\"]},\n    {cat:\"Account & Setup\",id:\"Q3\",q:\"How frequently do you use Claude?\",type:\"multi\",max:3,opts:[\"Rarely (< weekly)\",\"Weekly\",\"Several times per week\",\"Daily\",\"Multiple times daily\"]},\n    {cat:\"Account & Setup\",id:\"Q4\",q:\"Have you set up User Preferences in Settings? (These let you tell Claude about yourself — your role, tone, and how you like responses)\",type:\"yesno\",max:2,opts:[\"Yes\",\"No\"]},\n    {cat:\"Account & Setup\",id:\"Q5\",q:\"Have you configured a custom User Style? (A saved set of rules for how Claude writes — length, format, voice)\",type:\"yesno\",max:2,opts:[\"Yes\",\"No\"]},\n    {cat:\"Interface Knowledge\",id:\"Q6\",q:\"Can you explain the difference between Chat, Projects, and Cowork? (Chat = single conversations · Projects = organised workspaces with saved context · Cowork = Claude works alongside you on files and tasks)\",type:\"scale\",max:3},\n    {cat:\"Interface Knowledge\",id:\"Q7\",q:\"Do you use Claude Projects to organise work by client or domain? (Projects let you group conversations and upload reference documents in one place)\",type:\"multi\",max:3,opts:[\"Never heard of it\",\"Aware but don't use\",\"Occasionally\",\"Regularly\",\"It's my default\"]},\n    {cat:\"Interface Knowledge\",id:\"Q8\",q:\"Do you use Project Knowledge (uploaded docs) to make Claude's responses more accurate and relevant?\",type:\"multi\",max:3,opts:[\"Never\",\"Rarely\",\"Sometimes\",\"Often\",\"Always\"]},\n    {cat:\"Interface Knowledge\",id:\"Q9\",q:\"Have you used Cowork? (A mode where Claude actively works on files and tasks alongside you)\",type:\"yesno\",max:2,opts:[\"Yes\",\"No\"]},\n    {cat:\"Interface Knowledge\",id:\"Q10\",q:\"Do you use Artifacts? (Interactive outputs Claude creates — documents, code, visualisations, mini-apps that appear in a side panel)\",type:\"multi\",max:3,opts:[\"Never\",\"Rarely\",\"Sometimes\",\"Often\",\"Always\"]},\n    {cat:\"Skills & Customisation\",id:\"Q11\",q:\"How many Claude Skills have you created or deployed? (Skills are reusable saved instructions that tell Claude how to perform a specific task)\",type:\"multi\",max:3,opts:[\"0\",\"1-5\",\"6-15\",\"16-30\",\"30+\"]},\n    {cat:\"Skills & Customisation\",id:\"Q12\",q:\"Rate your understanding of how to write and structure a Claude Skill file\",type:\"scale\",max:3},\n    {cat:\"Skills & Customisation\",id:\"Q13\",q:\"Do your skills include trigger phrases (words that activate a skill) and exclusion rules (conditions where it shouldn't activate)?\",type:\"multi\",max:3,opts:[\"Don't know what this means\",\"No\",\"Some do\",\"Most do\",\"All do\"]},\n    {cat:\"Skills & Customisation\",id:\"Q14\",q:\"Have you revised and improved a skill over time based on the quality of its output?\",type:\"yesno\",max:2,opts:[\"Yes\",\"No\"]},\n    {cat:\"Skills & Customisation\",id:\"Q15\",q:\"Do you use Project Instructions? (Background instructions you set once that guide every conversation in a project)\",type:\"multi\",max:3,opts:[\"Never\",\"Rarely\",\"Sometimes\",\"Often\",\"Always\"]},\n    {cat:\"MCP & Integrations\",id:\"Q16\",q:\"How many MCP integrations do you have connected? (MCP — Model Context Protocol — lets Claude connect to your other apps and data sources)\",type:\"multi\",max:3,opts:[\"0\",\"1-3\",\"4-7\",\"8-12\",\"13+\"]},\n    {cat:\"MCP & Integrations\",id:\"Q17\",q:\"Which connected apps (MCP connectors) do you actively use with Claude? (e.g. Google Drive, Slack, Xero, SharePoint)\",type:\"text\",max:0},\n    {cat:\"MCP & Integrations\",id:\"Q18\",q:\"Do you use Claude with external tools (Slack, Xero, SharePoint, Gmail)?\",type:\"multi\",max:3,opts:[\"None\",\"1 tool\",\"2-3 tools\",\"4-6 tools\",\"7+ tools\"]},\n    {cat:\"MCP & Integrations\",id:\"Q19\",q:\"Have you used Claude Code (an AI coding tool for your terminal) or Claude in Chrome (a browser extension)?\",type:\"multi\",max:2,opts:[\"Neither\",\"One of them\",\"Both\"]},\n    {cat:\"Workflow & Use Cases\",id:\"Q20\",q:\"What is your primary use case for Claude?\",type:\"text\",max:0},\n    {cat:\"Workflow & Use Cases\",id:\"Q21\",q:\"Do you use Claude for financial modelling or spreadsheet work?\",type:\"multi\",max:3,opts:[\"Never\",\"Experimenting\",\"Regular use\",\"Core workflow\"]},\n    {cat:\"Workflow & Use Cases\",id:\"Q22\",q:\"Do you use Claude for document creation (Word, PPT, PDF)?\",type:\"multi\",max:3,opts:[\"Never\",\"Experimenting\",\"Regular use\",\"Core workflow\"]},\n    {cat:\"Workflow & Use Cases\",id:\"Q23\",q:\"Do you use Claude for email/comms drafting and triage?\",type:\"multi\",max:3,opts:[\"Never\",\"Experimenting\",\"Regular use\",\"Core workflow\"]},\n    {cat:\"Workflow & Use Cases\",id:\"Q24\",q:\"Have you built multi-step workflows or automated sequences where Claude completes several tasks in a row?\",type:\"multi\",max:3,opts:[\"No\",\"Planning to\",\"Built one\",\"Built several\",\"Production system (live and running daily)\"]},\n    {cat:\"Prompt Engineering\",id:\"Q25\",q:\"Rate your ability to write effective instructions for Claude (known as prompt engineering)\",type:\"scale\",max:3},\n    {cat:\"Prompt Engineering\",id:\"Q26\",q:\"Do you use structured prompts? (Using formatting like labelled sections, worked examples, or explicit constraints to guide Claude)\",type:\"multi\",max:3,opts:[\"Never\",\"Rarely\",\"Sometimes\",\"Often\",\"Always\"]},\n    {cat:\"Prompt Engineering\",id:\"Q27\",q:\"Do you refine and improve your prompts based on the quality of Claude's responses?\",type:\"multi\",max:3,opts:[\"Never\",\"Rarely\",\"Sometimes\",\"Often\",\"Always\"]},\n    {cat:\"Prompt Engineering\",id:\"Q28\",q:\"Have you used Extended Thinking (Claude shows its reasoning step-by-step) or Deep Research (Claude searches and synthesises information)?\",type:\"multi\",max:2,opts:[\"Neither\",\"One\",\"Both\"]},\n    {cat:\"Agents & Evaluation\",id:\"Q29\",q:\"Have you built agents or digital workers? (AI assistants you set up to handle tasks with minimal human input)\",type:\"multi\",max:3,opts:[\"No\",\"Exploring the concept\",\"Built one prototype\",\"Built several\",\"Running production agents\"]},\n    {cat:\"Agents & Evaluation\",id:\"Q30\",q:\"Do you test new AI model updates against your own tasks to see if they perform better?\",type:\"multi\",max:3,opts:[\"No\",\"Informally tested new models\",\"Compared outputs side-by-side\",\"Structured rubric-based evaluation\",\"Automated testing system that scores new models\"]},\n    {cat:\"Strategic Adoption\",id:\"Q31\",q:\"Is Claude embedded in your team's standard operating procedures?\",type:\"multi\",max:3,opts:[\"No\",\"Discussing\",\"Piloting\",\"Partially\",\"Fully\"]},\n    {cat:\"Strategic Adoption\",id:\"Q32\",q:\"Do you measure ROI (return on investment) or time savings from Claude usage?\",type:\"multi\",max:3,opts:[\"No\",\"Informally\",\"Some metrics\",\"Formal tracking\",\"Full ROI model\"]}\n  ];\n\n  maxPossible = this.questions.reduce((s, q) => s + q.max, 0);\n\n  nextStepsMap = {\n    'Novice': 'Start with Claude Pro or Max. Set up User Preferences. Try one Project with uploaded context. Focus on learning the interface before building workflows.',\n    'Explorer': 'Create your first 3 Skills. Connect 1-2 MCP integrations (start with Slack or Google Drive). Learn structured prompting with XML tags.',\n    'Practitioner': 'Build a skill library (target 10+). Connect 5+ MCPs. Start measuring time savings. Consider the AI-Powered Accountant programme for structured upskilling.',\n    'Advanced': 'Design multi-agent workflows. Set up a backup harness (Copilot Studio). Train your team. Build evaluation processes for new model releases.',\n    'Expert': 'Contribute to the skill ecosystem. Mentor others. Build custom MCP servers. Evaluate open-source alternatives for architecture resilience.'\n  };\n\n  // Google Sheets Apps Script Web App URL\n  SHEETS_URL = 'https://script.google.com/macros/s/AKfycbzz8R9OAToIdSCrXdkDtCvgU_GdTpcp1h0dNgH8MRNu1hegADhGaiFn-_2IxViJzrpnFA/exec';\n\n  getScore(q) {\n    const val = this.state.answers[q.id];\n    if (val === undefined) return 0;\n    if (q.max === 0) return 0;\n    if (q.type === 'yesno') return val === 0 ? q.max : 0;\n    if (q.type === 'scale') return Math.ceil(val * q.max / 5);\n    if (q.type === 'multi') return Math.min(val, q.max);\n    return 0;\n  }\n\n  getAnswerLabel(q) {\n    const val = this.state.answers[q.id];\n    if (val === undefined) return '';\n    if (q.type === 'text') return String(val);\n    if (q.type === 'scale') return String(val) + '/5';\n    if (q.opts) return q.opts[val] || '';\n    return String(val);\n  }\n\n  calculateScores() {\n    let total = 0;\n    const catScores = {};\n    const catMax = {};\n    this.questions.forEach(q => {\n      const s = this.getScore(q);\n      total += s;\n      if (!catScores[q.cat]) catScores[q.cat] = 0;\n      if (!catMax[q.cat]) catMax[q.cat] = 0;\n      catScores[q.cat] += s;\n      catMax[q.cat] += q.max;\n    });\n    const pct = total / this.maxPossible;\n    let level;\n    if (pct >= 0.85) level = 'Expert';\n    else if (pct >= 0.7) level = 'Advanced';\n    else if (pct >= 0.5) level = 'Practitioner';\n    else if (pct >= 0.3) level = 'Explorer';\n    else level = 'Novice';\n    return { total, pct, level, catScores, catMax };\n  }\n\n  selectOpt(qid, val) {\n    this.setState(s => ({ answers: { ...s.answers, [qid]: val } }));\n  }\n\n  selectScale(qid, val) {\n    this.setState(s => ({ answers: { ...s.answers, [qid]: val } }));\n  }\n\n  textAnswer(qid, val) {\n    this.setState(s => {\n      const a = { ...s.answers };\n      if (val.trim()) a[qid] = val.trim();\n      else delete a[qid];\n      return { answers: a };\n    });\n  }\n\n  async submitAssessment() {\n    const { respName, respEmail, respOrg, respRole, answers } = this.state;\n    if (!respName || !respEmail) {\n      this.setState({ statusMsg: 'Please fill in your name and email.', statusType: 'error' });\n      return;\n    }\n    const scored = this.questions.filter(q => q.max > 0);\n    const unanswered = scored.filter(q => answers[q.id] === undefined);\n    if (unanswered.length > 5) {\n      this.setState({ statusMsg: `Please answer more questions. ${unanswered.length} scored questions are unanswered.`, statusType: 'error' });\n      return;\n    }\n\n    this.setState({ submitting: true, statusMsg: 'Submitting your assessment...', statusType: 'sending' });\n\n    const { total, pct, level, catScores, catMax } = this.calculateScores();\n\n    const payload = {\n      timestamp: new Date().toISOString(),\n      name: respName,\n      email: respEmail,\n      organisation: respOrg,\n      role: respRole,\n      total_score: total,\n      max_possible: this.maxPossible,\n      percentage: Math.round(pct * 100),\n      maturity_level: level,\n    };\n\n    Object.keys(catScores).forEach(cat => {\n      const key = 'cat_' + cat.toLowerCase().replace(/[^a-z0-9]/g, '_');\n      payload[key] = catScores[cat] + '/' + catMax[cat];\n    });\n\n    this.questions.forEach(q => {\n      payload[q.id] = this.getAnswerLabel(q);\n      payload[q.id + '_score'] = this.getScore(q);\n    });\n\n    let webhookOk = false;\n    if (this.SHEETS_URL && this.SHEETS_URL !== 'YOUR_GOOGLE_APPS_SCRIPT_URL_HERE') {\n      try {\n        // Use a form-based submission to avoid CORS/redirect issues with Apps Script\n        const form = document.createElement('form');\n        form.method = 'POST';\n        form.action = this.SHEETS_URL;\n        form.target = '_gas_submit';\n        form.style.display = 'none';\n        const input = document.createElement('input');\n        input.type = 'hidden';\n        input.name = 'payload';\n        input.value = JSON.stringify(payload);\n        form.appendChild(input);\n        // Create a hidden iframe target so form doesn't navigate\n        let iframe = document.getElementById('_gas_submit');\n        if (!iframe) {\n          iframe = document.createElement('iframe');\n          iframe.id = '_gas_submit';\n          iframe.name = '_gas_submit';\n          iframe.style.display = 'none';\n          document.body.appendChild(iframe);\n        }\n        document.body.appendChild(form);\n        form.submit();\n        document.body.removeChild(form);\n        // Wait a moment for submission\n        await new Promise(r => setTimeout(r, 2000));\n        webhookOk = true;\n      } catch (err) {\n        console.error('Submission error:', err);\n      }\n    }\n\n    if (webhookOk) {\n      this.setState({ submitting: false, showResults: true, statusMsg: 'Assessment submitted successfully!', statusType: 'success' });\n    } else if (this.SHEETS_URL === 'YOUR_GOOGLE_APPS_SCRIPT_URL_HERE') {\n      this.setState({ submitting: false, showResults: true, statusMsg: 'Results calculated. Connect Google Sheets to auto-save responses.', statusType: 'sending' });\n    } else {\n      this.setState({ submitting: false, showResults: true, statusMsg: 'Results calculated. Webhook may not have connected — use CSV backup.', statusType: 'error' });\n    }\n  }\n\n  exportCSV() {\n    const { respName, respEmail, respOrg, respRole } = this.state;\n    const date = new Date().toISOString().split('T')[0];\n    const { total, level } = this.calculateScores();\n    const headers = ['Name','Email','Organisation','Role','Date','Total Score','Max Possible','Maturity Level'];\n    this.questions.forEach(q => headers.push(q.id));\n    const vals = [respName, respEmail, respOrg, respRole, date, total, this.maxPossible, level];\n    this.questions.forEach(q => {\n      const label = this.getAnswerLabel(q);\n      vals.push(label.includes(',') ? '\"' + label.replace(/\"/g,'\"\"') + '\"' : label);\n    });\n    const csv = headers.join(',') + '\\n' + vals.join(',');\n    const blob = new Blob([csv], { type: 'text/csv' });\n    const url = URL.createObjectURL(blob);\n    const a = document.createElement('a');\n    a.href = url;\n    a.download = `claude_assessment_${respName.replace(/\\s+/g, '_')}_${date}.csv`;\n    a.click();\n    URL.revokeObjectURL(url);\n  }\n\n  copyResults() {\n    const { respName } = this.state;\n    const { total, pct, level, catScores, catMax } = this.calculateScores();\n    let summary = `Claude Usage Maturity Assessment\\n${respName}\\nScore: ${total}/${this.maxPossible} (${Math.round(pct * 100)}%)\\nLevel: ${level}\\n\\nCategory Breakdown:\\n`;\n    Object.keys(catScores).forEach(cat => {\n      summary += `  ${cat}: ${catScores[cat]}/${catMax[cat]} (${Math.round(catScores[cat] / catMax[cat] * 100)}%)\\n`;\n    });\n    summary += `\\nNext Steps: ${this.nextStepsMap[level]}\\n\\nAssessed: ${new Date().toLocaleDateString('en-AU')}\\nPowered by Model Citizn | www.modelcitizn.com`;\n    navigator.clipboard.writeText(summary).then(() => {\n      this.setState({ statusMsg: 'Results copied to clipboard!', statusType: 'success' });\n    });\n  }\n\n  renderVals() {\n    const { answers, showResults, submitting, statusMsg, statusType, respName, respEmail } = this.state;\n    const answered = Object.keys(answers).length;\n    const progressPct = Math.round((answered / this.questions.length) * 100);\n    const progressLabel = `${answered} of ${this.questions.length} answered`;\n\n    const { total, pct, level, catScores, catMax } = this.calculateScores();\n\n    // Category bar colors\n    const catBarColor = (cpct) => cpct >= 70 ? '#34d399' : cpct >= 40 ? '#fbbf24' : '#f87171';\n\n    // Badge colors per level\n    const badgeMap = {\n      'Novice':       { bg: 'rgba(248,113,113,0.15)', color: '#f87171', border: 'rgba(248,113,113,0.3)' },\n      'Explorer':     { bg: 'rgba(251,191,36,0.15)', color: '#fbbf24', border: 'rgba(251,191,36,0.3)' },\n      'Practitioner': { bg: 'rgba(111,147,189,0.15)', color: '#6f93bd', border: 'rgba(111,147,189,0.3)' },\n      'Advanced':     { bg: 'rgba(52,211,153,0.15)', color: '#34d399', border: 'rgba(52,211,153,0.3)' },\n      'Expert':       { bg: 'rgba(16,185,129,0.15)', color: '#10b981', border: 'rgba(16,185,129,0.3)' }\n    };\n    const badge = badgeMap[level] || badgeMap['Novice'];\n\n    // Status colors\n    const statusColors = { success: { bg: 'rgba(52,211,153,0.1)', border: 'rgba(52,211,153,0.3)', color: '#34d399' }, error: { bg: 'rgba(248,113,113,0.1)', border: 'rgba(248,113,113,0.3)', color: '#f87171' }, sending: { bg: 'rgba(111,147,189,0.1)', border: 'rgba(111,147,189,0.3)', color: '#6f93bd' } };\n    const sc = statusColors[statusType] || statusColors.sending;\n\n    // Build form content via createElement\n    const h = React.createElement;\n    const self = this;\n\n    // Styles\n    const sectionHeaderStyle = {\n      background: 'var(--navy-600)', padding: '14px 20px', borderRadius: 'var(--radius-lg) var(--radius-lg) 0 0',\n      font: 'var(--w-semibold) 15px/1.3 var(--font-sans)', color: 'var(--cloud)',\n      display: 'flex', alignItems: 'center', gap: '10px', borderBottom: '1px solid var(--slate-line)'\n    };\n    const cardStyle = {\n      background: 'var(--navy-700)', border: '1px solid var(--slate-line)',\n      borderRadius: '0 0 var(--radius-lg) var(--radius-lg)', padding: 0\n    };\n    const questionStyle = { padding: '18px 20px', borderBottom: '1px solid rgba(44,58,85,0.5)' };\n    const optBaseStyle = {\n      display: 'flex', alignItems: 'center', gap: '10px', padding: '10px 14px',\n      border: '2px solid var(--slate-line)', borderRadius: 'var(--radius-sm)',\n      cursor: 'pointer', transition: 'all 0.15s', fontSize: '14px', fontFamily: 'var(--font-sans)',\n      color: 'var(--mist)', background: 'transparent'\n    };\n    const optSelectedStyle = {\n      ...optBaseStyle, borderColor: 'var(--coral)', background: 'rgba(240,101,63,0.08)', color: 'var(--cloud)'\n    };\n    const dotBase = {\n      width: 18, height: 18, borderRadius: '50%', border: '2px solid var(--slate-line)',\n      flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', transition: 'all 0.15s'\n    };\n    const dotSelected = {\n      ...dotBase, borderColor: 'var(--coral)', background: 'var(--coral)'\n    };\n    const scaleBtnBase = {\n      flex: 1, padding: '10px 0', textAlign: 'center', border: '2px solid var(--slate-line)',\n      borderRadius: 'var(--radius-sm)', cursor: 'pointer', fontWeight: 600, fontSize: '14px',\n      fontFamily: 'var(--font-sans)', transition: 'all 0.15s', color: 'var(--mist)', background: 'transparent'\n    };\n    const scaleBtnSelected = {\n      ...scaleBtnBase, borderColor: 'var(--coral)', background: 'var(--coral)', color: 'var(--white)'\n    };\n    const inputStyle = {\n      width: '100%', padding: '10px 14px', border: '1px solid var(--slate-line)',\n      borderRadius: 'var(--radius-sm)', fontSize: '14px', fontFamily: 'var(--font-sans)',\n      background: 'var(--navy-600)', color: 'var(--cloud)', outline: 'none', boxSizing: 'border-box',\n      transition: 'border-color 0.15s'\n    };\n\n    if (showResults) {\n      // Results view\n      const catRows = Object.keys(catScores).map(cat => {\n        const cpct = catMax[cat] > 0 ? Math.round(catScores[cat] / catMax[cat] * 100) : 0;\n        const barColor = catBarColor(cpct);\n        return h('div', { key: cat, style: { display: 'flex', alignItems: 'center', padding: '10px 0', borderBottom: '1px solid rgba(44,58,85,0.4)' } },\n          h('span', { style: { fontSize: 14, fontWeight: 600, minWidth: 140, color: 'var(--cloud)', fontFamily: 'var(--font-sans)' } }, cat),\n          h('div', { style: { flex: 1, margin: '0 16px', height: 6, background: 'var(--navy-600)', borderRadius: 'var(--radius-pill)', overflow: 'hidden' } },\n            h('div', { style: { height: '100%', borderRadius: 'var(--radius-pill)', width: cpct + '% r(--navy-600)', borderTop: '1px solid var(--slate-line)' } },\n              h('h3', { style: { fontSize: 15, fontWeight: 600, color: 'var(--cloud)', margin: '0 0 8px', fontFamily: 'var(--font-sans)' } }, 'Recommended Next Steps'),\n              h('p', { style: { fontSize: 14, color: 'var(--mist)', lineHeight: 1.6, margin: 0, fontFamily: 'var(--font-sans)' } }, this.nextStepsMap[level])\n            ),\n            h('div', { style: { padding: '20px 32px', display: 'flex', gap: 12, justifyContent: 'center', flexWrap: 'wrap' } },\n              h('button', {\n                onClick: () => self.exportCSV(),\n                style: { display: 'inline-flex', alignItems: 'center', gap: 8, padding: '12px 24px', borderRadius: 'var(--radius-pill)', border: '1px solid var(--slate-line)', background: 'var(--navy-600)', color: 'var(--cloud)', fontWeight: 600, fontSize: 14, fontFamily: 'var(--font-sans)', cursor: 'pointer', transition: 'all 0.15s' }\n              }, 'Download CSV'),\n              h('button', {\n                onClick: () => self.copyResults(),\n                style: { display: 'inline-flex', alignItems: 'center', gap: 8, padding: '12px 24px', borderRadius: 'var(--radius-pill)', border: 'none', background: 'var(--coral)', color: 'var(--white)', fontWeight: 600, fontSize: 14, fontFamily: 'var(--font-sans)', cursor: 'pointer', boxShadow: 'var(--shadow-cta)', transition: 'all 0.15s' }\n              }, 'Copy Summary')\n            )\n          ),\n          // Status message\n          statusMsg ? h('div', { style: { textAlign: 'center', padding: '12px 16px', borderRadius: 'var(--radius-sm)', fontSize: 14, fontWeight: 600, fontFamily: 'var(--font-sans)', marginTop: 16, background: sc.bg, border: `1px solid ${sc.border}`, color: sc.color } }, statusMsg) : null\n        )\n      };\n    }\n\n    // FORM VIEW\n    // Build sections\n    const sections = [];\n    let currentCat = '';\n    let currentQuestions = [];\n    const catCount = {};\n    this.questions.forEach(q => { catCount[q.cat] = (catCount[q.cat] || 0) + 1; });\n\n    const flushSection = () => {\n      if (!currentCat) return;\n      sections.push(\n        h('div', { key: currentCat, style: { marginBottom: 24 } },\n          h('div', { style: sectionHeaderStyle },\n            currentCat,\n            h('span', { style: { background: 'rgba(240,101,63,0.15)', color: 'var(--coral)', padding: '2px 10px', borderRadius: 'var(--radius-pill)', fontSize: 12, fontWeight: 600 } }, `${catCount[currentCat]} questions`)\n          ),\n          h('div', { style: cardStyle }, ...currentQuestions)\n        )\n      );\n      currentQuestions = [];\n    };\n\n    this.questions.forEach((q, qi) => {\n      if (q.cat !== currentCat) {\n        flushSection();\n        currentCat = q.cat;\n      }\n      const isLast = qi === this.questions.length - 1 || this.questions[qi + 1].cat !== q.cat;\n      let control;\n\n      if (q.type === 'multi' || q.type === 'yesno') {\n        control = h('div', { style: { display: 'flex', flexDirection: 'column', gap: 6 } },\n          q.opts.map((opt, oi) =>\n            h('div', {\n              key: oi,\n              onClick: () => self.selectOpt(q.id, oi),\n              style: answers[q.id] === oi ? optSelectedStyle : optBaseStyle\n            },\n              h('span', { style: answers[q.id] === oi ? dotSelected : dotBase },\n                answers[q.id] === oi ? h('span', { style: { width: 8, height: 8, borderRadius: '50%', background: 'var(--white)' } }) : null\n              ),\n              h('span', null, opt)\n            )\n          )\n        );\n      } else if (q.type === 'scale') {\n        control = h('div', null,\n          h('div', { style: { display: 'flex', gap: 6 } },\n            [1, 2, 3, 4, 5].map(i =>\n              h('div', {\n                key: i,\n                onClick: () => self.selectScale(q.id, i),\n                style: answers[q.id] === i ? scaleBtnSelected : scaleBtnBase\n              }, i)\n            )\n          ),\n          h('div', { style: { display: 'flex', justifyContent: 'space-between', fontSize: 11, color: 'var(--mist-dim)', marginTop: 6, padding: '0 4px', fontFamily: 'var(--font-sans)' } },\n            h('span', null, 'No idea'), h('span', null, 'Expert')\n          )\n        );\n      } else {\n        control = h('textarea', {\n          placeholder: 'Your answer...',\n          onChange: (e) => self.textAnswer(q.id, e.target.value),\n          style: { ...inputStyle, minHeight: 56, resize: 'vertical' }\n        });\n      }\n\n      currentQuestions.push(\n        h('div', { key: q.id, style: { ...questionStyle, borderBottom: isLast ? 'none' : '1px solid rgba(44,58,85,0.4)' } },\n          h('div', { style: { fontSize: 14, fontWeight: 600, marginBottom: 12, display: 'flex', gap: 8, fontFamily: 'var(--font-sans)', lineHeight: 1.4 } },\n            h('span', { style: { color: 'var(--coral)', fontWeight: 700, minWidth: 28, fontFamily: 'var(--font-display)' } }, q.id),\n            h('span', { style: { color: 'var(--cloud)' } }, q.q)\n          ),\n          control\n        )\n      );\n    });\n    flushSection();\n\n    // Respondent info section\n    const infoSection = h('div', { style: { marginBottom: 24 } },\n      h('div', { style: sectionHeaderStyle },\n        h('span', null, 'Your Details')\n      ),\n      h('div', { style: { ...cardStyle, padding: '20px' } },\n        h('div', { style: { display: 'flex', flexDirection: 'column', gap: 16 } },\n          h('div', null,\n            h('label', { style: { fontSize: 13, fontWeight: 600, color: 'var(--steel)', fontFamily: 'var(--font-sans)' } }, 'Full Name *'),\n            h('input', { type: 'text', placeholder: 'Your name', value: respName, onChange: (e) => self.setState({ respName: e.target.value }), style: { ...inputStyle, marginTop: 6 } })\n          ),\n          h('div', null,\n            h('label', { style: { fontSize: 13, fontWeight: 600, color: 'var(--steel)', fontFamily: 'var(--font-sans)' } }, 'Email *'),\n            h('input', { type: 'email', placeholder: 'your@email.com', value: respEmail, onChange: (e) => self.setState({ respEmail: e.target.value }), style: { ...inputStyle, marginTop: 6 } })\n          ),\n          h('div', null,\n            h('label', { style: { fontSize: 13, fontWeight: 600, color: 'var(--steel)', fontFamily: 'var(--font-sans)' } }, 'Organisation'),\n            h('input', { type: 'text', placeholder: 'Company name', value: this.state.respOrg, onChange: (e) => self.setState({ respOrg: e.target.value }), style: { ...inputStyle, marginTop: 6 } })\n          ),\n          h('div', null,\n            h('label', { style: { fontSize: 13, fontWeight: 600, color: 'var(--steel)', fontFamily: 'var(--font-sans)' } }, 'Role'),\n            h('input', { type: 'text', placeholder: 'e.g. CFO, Accountant, Consultant', value: this.state.respRole, onChange: (e) => self.setState({ respRole: e.target.value }), style: { ...inputStyle, marginTop: 6 } })\n          )\n        )\n      )\n    );\n\n    // Submit button\n    const submitArea = h('div', { style: { padding: '24px 0', textAlign: 'center' } },\n      h('button', {\n        onClick: () => self.submitAssessment(),\n        disabled: submitting,\n        style: {\n          display: 'inline-flex', alignItems: 'center', gap: 10, padding: '16px 40px',\n          borderRadius: 'var(--radius-pill)', border: 'none', background: submitting ? 'var(--coral-dim)' : 'var(--coral)',\n          color: 'var(--white)', fontWeight: 700, fontSize: 16, fontFamily: 'var(--font-sans)',\n          cursor: submitting ? 'not-allowed' : 'pointer', boxShadow: 'var(--shadow-cta)',\n          transition: 'all 0.15s', opacity: submitting ? 0.7 : 1\n        }\n      },\n        h('span', null, submitting ? 'Submitting...' : 'Submit Assessment'),\n        submitting ? h('span', { style: { display: 'inline-block', width: 16, height: 16, border: '2px solid rgba(255,255,255,0.3)', borderTopColor: '#fff',
